services:

  # ── ASP.NET Core API ───────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: notes_api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Default=Data Source=/data/notes.db
      - Jwt__Key=${JWT_SECRET}
      - Jwt__Issuer=NotesApp
      - Jwt__Audience=NotesAppUsers
      - Redis__Connection=redis:6379
    volumes:
      - sqlite_data:/data
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - notes_net

  # ── Vite + React Frontend ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev                 # swap to 'prod' for production
    container_name: notes_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app           # live-reload in dev
      - /app/node_modules         # preserve container's node_modules
    depends_on:
      - api
    networks:
      - notes_net

  # ── Redis (cache) ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: notes_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - notes_net

  # ── SQLite Web (purpose-built SQLite browser, no auth needed) ────
  sqliteweb:
    image: coleifer/sqlite-web
    container_name: notes_sqliteweb
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - sqlite_data:/data
    command: sqlite_web --host 0.0.0.0 --port 8080  /data/notes.db
    networks:
      - notes_net

volumes:
  sqlite_data:
  redis_data:

networks:
  notes_net:
    driver: bridge
